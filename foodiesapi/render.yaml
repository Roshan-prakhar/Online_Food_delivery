services:
  # Spring Boot API Service
  - type: web
    name: foodies-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: foodiesapi
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      # PostgreSQL connection (use Neon: https://neon.tech)
      # Format: jdbc:postgresql://<host>/<db>?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # JWT signing secret (generate a random 64+ char string)
      - key: JWT_SECRET
        sync: false

      # Cloudinary (image storage)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: foodies

      # Razorpay (payments - test mode)
      - key: RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false

      # CORS origins - set this AFTER deploying the frontends
      # e.g. https://foodies-customer.netlify.app,https://foodies-admin.netlify.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false
