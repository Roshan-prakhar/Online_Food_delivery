spring.application.name=foodiesapi

# H2 In-Memory Database for Development
spring.datasource.url=jdbc:h2:mem:foodies
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, accessible at /h2-console)
spring.h2.console.enabled=true

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Disable data initialization on startup
spring.sql.init.mode=never

# Cloudflare R2 Configuration (Optional for local testing)
cloudflare.access.key=${CLOUDFLARE_ACCESS_KEY:test_access_key}
cloudflare.secret.key=${CLOUDFLARE_SECRET_KEY:test_secret_key}
cloudflare.endpoint=${CLOUDFLARE_R2_ENDPOINT:https://test.r2.cloudflarestorage.com}
cloudflare.bucketname=${CLOUDFLARE_BUCKET_NAME:foodies-images}

# JWT Secret for Authentication
jwt.secret.key=${JWT_SECRET}

# Actuator Configuration for Health Check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Logging
logging.level.root=WARN
logging.level.in.roshan.foodiesapi=DEBUG
